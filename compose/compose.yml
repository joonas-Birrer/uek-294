name: todo-abgabe
services:
  keycloak-abgabe:
    image: decheritservices/sample-uek-keycloak:v1.1.52
    restart: unless-stopped
    container_name: keycloak-abgabe
    ports:
      - "38081:8080"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_PROXY_HEADERS=xforwarded
      - KC_HOSTNAME=http://localhost:38081
    entrypoint: '/opt/keycloak/bin/kc.sh start-dev --import-realm'
    healthcheck:
      test: ["CMD-SHELL", "/bin/bash -c 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  todo-api-abgabe:
    image: decheritservices/todo-api:v1.1.51
    restart: unless-stopped
    container_name: todo-api-abgabe
    depends_on:
      keycloak-abgabe:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      - LOG_LEVELS=fatal,error,warn,log,debug,verbose
      - API_PROTOCOL=http
      - API_SERVER=0.0.0.0
      - API_EXTERNAL=http://localhost:3001
      - API_PORT=3000
      - API_GLOBAL_PREFIX=api
      - AUTH_BASE_URL=http://keycloak-abgabe:8080
      - AUTH_ISSUER_BASE_URL=http://localhost:38081
      - AUTH_REALM=dev
      - AUTH_CLIENT_ID=client-app
      - API_DATA_DB=database/todo.db
      - DATABASE_LOG=all
#    volumes:
#      - ./todo_api:/usr/src/app/database