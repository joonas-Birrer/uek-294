services:
  keycloak-abgabe:
    image: decheritservices/sample-uek-keycloak:v1.1.52
    ports:
      - "38081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  todo-api-abgabe:
    image: decheritservices/todo-api:v1.1.51
    ports:
      - "3001:3000"
    environment:
      KEYCLOAK_URL: http://keycloak-abgabe:8080
      KEYCLOAK_REALM: uek294
      KEYCLOAK_CLIENT_ID: todo-api
    depends_on:
      keycloak-abgabe:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
