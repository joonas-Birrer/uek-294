<h2 mat-dialog-title>Delete Todo {{ data.name }}</h2>

<mat-dialog-content>
  Soll das Todo-Item <strong>{{ data.name }}</strong> geloscht werden?
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-flat-button class="no-thanks" type="button" (click)="cancel()">No Thanks</button>
  <button mat-button type="button" (click)="confirm()">Delete</button>
</mat-dialog-actions>
