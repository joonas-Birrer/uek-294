<h2 mat-dialog-title>Todo loeschen</h2>

<mat-dialog-content>
  Soll das Todo-Item <strong>{{ data.name }}</strong> wirklich geloescht werden?
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-flat-button class="no-thanks" type="button" (click)="cancel()">Abbrechen</button>
  <button mat-button type="button" (click)="confirm()">Loeschen</button>
</mat-dialog-actions>
